name: GitHub Metrics

on:
  # 📅 Runs automatically every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # 💡 Allows manual execution anytime from the Actions tab
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Metrics embed
        uses: lowlighter/metrics@v3.34
        with:
          # 🔑 GitHub token stored in repository secrets
          token: ${{ secrets.METRICS_TOKEN }}
          
          # 📄 Output file saved directly to your repository root
          filename: github-metrics.svg
          
          # 🗃️ Base profile data (header, recent activity, community, repo counts)
          base: header, activity, community, repositories, metadata
          
          # 👨‍💻 Lines of Code Changed (added/deleted)
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          
          # 🤹 Most used programming languages
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          
          # 📅 3D Isometric Commit Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # 🕒 Active Coding Hours & Commit Habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # 🏷️ Repository Tech Topics
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          
          # 🏆 Developer Achievements & Badges
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 6
